name: Batchalign Python

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-cli:
    name: Build CLI Binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-workspace
      - name: Build dashboard
        run: make batchalign-dashboard-build
      - name: Build CLI binary
        run: cargo build --release -p batchalign
      - uses: actions/upload-artifact@v6
        with:
          name: cli-binary
          path: target/release/batchalign3
          retention-days: 1
      - uses: actions/upload-artifact@v6
        with:
          name: dashboard-dist
          path: frontend/dist/
          retention-days: 1
          if-no-files-found: error

  build-wheel:
    name: Build Wheel (${{ matrix.python-version }})
    needs: build-cli
    runs-on: ubuntu-latest
    strategy:
      # Push events build only the canonical Python (3.12). workflow_dispatch
      # exercises the full 3.12/3.13/3.14 matrix for cross-version compat
      # verification on release tags or manual reruns. Wall-time win on push:
      # ~20 min (two fat-LTO release builds skipped).
      matrix:
        python-version: ${{ fromJSON(github.event_name == 'workflow_dispatch' && '["3.12","3.13","3.14"]' || '["3.12"]') }}
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "pyo3 -> target"
          shared-key: build-wheel-${{ matrix.python-version }}
      - uses: actions/download-artifact@v6
        with:
          name: cli-binary
          path: batchalign/_bin/
      - uses: actions/download-artifact@v6
        with:
          name: dashboard-dist
          path: frontend/dist/
      - name: Make CLI binary executable
        run: chmod +x batchalign/_bin/batchalign3
      - name: Build wheel
        # BATCHALIGN_PRESTAGED_BIN=1 tells the Makefile to reuse the
        # binary downloaded above (from build-cli, compiled from THIS
        # commit's sources). Skips ~9 min of duplicate fat-LTO compile
        # per matrix entry. The 2026-04-29 deploy postmortem's stale-
        # binary risk does not apply here because the artifact came
        # from build-cli's compile of the same commit.
        env:
          BATCHALIGN_PRESTAGED_BIN: "1"
        run: make batchalign-build-wheel
      - uses: actions/upload-artifact@v6
        with:
          name: wheel-${{ matrix.python-version }}
          path: dist/*.whl
          retention-days: 1

  test:
    name: Test (${{ matrix.python-version }})
    needs: build-wheel
    runs-on: ubuntu-latest
    strategy:
      # See build-wheel for the matrix-gating rationale: push runs 3.12
      # only; workflow_dispatch runs all three.
      matrix:
        python-version: ${{ fromJSON(github.event_name == 'workflow_dispatch' && '["3.12","3.13","3.14"]' || '["3.12"]') }}
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - uses: actions/download-artifact@v6
        with:
          name: wheel-${{ matrix.python-version }}
          path: dist/
      - name: Install from pre-built wheel
        run: |
          uv sync --group dev --no-install-project
          uv pip install --no-deps dist/*.whl
      - name: Run tests
        run: uv run --no-sync pytest batchalign --disable-pytest-warnings -k 'not test_whisper_fa_pipeline'

  smoke-test:
    name: Wheel Smoke Test
    needs: build-wheel
    runs-on: ubuntu-latest
    steps:
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"
      - uses: actions/download-artifact@v6
        with:
          name: wheel-3.12
          path: dist/
      - name: Install wheel in clean environment
        run: uv tool install --from dist/*.whl batchalign3
      - name: Smoke test — batchalign3 --help
        run: batchalign3 --help
      - name: Smoke test — batchalign3 version
        run: batchalign3 version

  typecheck:
    name: Type Check & CI Hygiene
    needs: build-wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-workspace
      - uses: actions/download-artifact@v6
        with:
          name: wheel-3.12
          path: dist/
      - uses: actions/download-artifact@v6
        with:
          name: dashboard-dist
          path: frontend/dist/
      - name: Install from pre-built wheel
        run: |
          uv sync --group dev --no-install-project
          uv pip install --no-deps dist/*.whl
      - name: Verify retirement gates
        run: |
          test ! -e batchalign/cli/cli.py
          test ! -e batchalign/serve/app.py
          test ! -e batchalign/serve/job_store.py
      - name: CI hygiene (Rust)
        run: cargo test -p batchalign --test ci_checks -q
      - name: Verify runtime constants
        run: uv run --no-sync python scripts/check_runtime_drift.py
      - name: Strict mypy
        run: uv run --no-sync mypy

  generated-artifacts:
    name: Generated Artifacts
    runs-on: ubuntu-latest
    # API-drift verification runs `make batchalign-dashboard-api-check`,
    # which transitively invokes cargo to regenerate openapi.json from
    # the Rust server, then diffs the result. Needs the pinned
    # toolchain + protoc; rust-cache is intentionally omitted to keep
    # the gate's startup cheap.
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Verify dashboard API artifacts
        run: make batchalign-dashboard-api-check

  # Note: the previous standalone `dashboard-web-build` job was retired —
  # its API-drift step duplicated `generated-artifacts` above, and its
  # dashboard build duplicated the one in `build-cli` (which now uploads
  # the result as the `dashboard-dist` artifact for downstream jobs).

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Python audit
        run: |
          uv export --no-hashes --no-dev --no-emit-project > requirements-audit.txt
          uvx pip-audit -r requirements-audit.txt
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-workspace
      - name: Generate lockfile
        run: cargo generate-lockfile
      - name: RustSec audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: taiki-e/install-action@cargo-deny
      - name: cargo-deny
        run: cargo deny check

  rust-integration:
    name: Rust Integration
    needs: build-wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-workspace
      - uses: actions/download-artifact@v6
        with:
          name: dashboard-dist
          path: frontend/dist/
      - uses: taiki-e/install-action@nextest
      - uses: actions/download-artifact@v6
        with:
          name: wheel-3.12
          path: dist/
      - name: Install batchalign
        run: |
          uv sync --group dev --no-install-project
          uv pip install --no-deps dist/*.whl
      - name: Rust imported crate check
        run: make batchalign-check
      - name: Server startup smoke test
        env:
          BATCHALIGN_PYTHON: ${{ github.workspace }}/.venv/bin/python
        run: |
          cargo build -p batchalign
          ./target/debug/batchalign3 serve start \
            --foreground --test-echo --warmup off --port 18123 &
          SERVER_PID=$!
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:18123/health | grep -q '"status":"ok"'; then
              echo "Server healthy after ${i}s"
              kill $SERVER_PID
              wait $SERVER_PID 2>/dev/null || true
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start within 30s"
          kill $SERVER_PID 2>/dev/null || true
          exit 1

  coverage:
    name: Coverage
    needs: build-wheel
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost
          sudo rm -rf /usr/local/lib/android /usr/share/swift
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-workspace
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: taiki-e/install-action@nextest
      - uses: actions/download-artifact@v6
        with:
          name: wheel-3.12
          path: dist/
      - name: Install from pre-built wheel
        run: |
          uv sync --group dev --no-install-project
          uv pip install --no-deps dist/*.whl
      - name: Python coverage
        run: uv run --no-sync pytest --cov=batchalign --cov-report=lcov:lcov-python.info batchalign --disable-pytest-warnings -k 'not test_whisper_fa_pipeline'
      - name: Rust PyO3 coverage
        run: cargo llvm-cov nextest --manifest-path pyo3/Cargo.toml --lcov --output-path lcov-rust.info
      - name: Rust workspace coverage
        run: cargo llvm-cov nextest --workspace --lcov --output-path lcov-rust-workspace.info

  dashboard-smoke:
    name: Dashboard Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            frontend/e2e/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: dashboard-release
      - name: Run smoke suite
        env:
          BATCHALIGN_PLAYWRIGHT_WITH_DEPS: "1"
          RUSTFLAGS: -C debuginfo=0
        run: bash scripts/run_react_dashboard_smoke.sh

  dashboard-e2e:
    name: Dashboard E2E
    # Depends on both build-cli (for the pre-built batchalign3 binary)
    # and build-wheel (for the Python wheel). Reusing build-cli's
    # binary instead of rebuilding here saves ~25 minutes of fat-LTO
    # Rust release compilation on every push — the bulk of the
    # historical Dashboard E2E wall-time.
    needs: [build-cli, build-wheel]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost
          sudo rm -rf /usr/local/lib/android /usr/share/swift
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: dashboard-release
      - uses: actions/download-artifact@v6
        with:
          name: wheel-3.12
          path: dist/
      - uses: actions/download-artifact@v6
        with:
          name: cli-binary
          path: target/release/
      - name: Make CLI binary executable
        run: chmod +x target/release/batchalign3
      - name: Install from pre-built wheel
        run: |
          uv sync --group dev --no-install-project
          uv pip install --no-deps dist/*.whl
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            frontend/e2e/package-lock.json
      - name: Run E2E suite
        env:
          BATCHALIGN_PLAYWRIGHT_WITH_DEPS: "1"
          BATCHALIGN_REAL_SERVER_E2E: "1"
          # scripts/run_react_dashboard_smoke.sh checks BATCHALIGN_BIN
          # and skips the cargo release build if the binary is already
          # in place. Pointing at the artifact downloaded above is what
          # makes this job sub-15-minute.
          BATCHALIGN_BIN: ${{ github.workspace }}/target/release/batchalign3
          RUSTFLAGS: -C debuginfo=0
        run: |
          export BATCHALIGN_PYTHON="$(uv run --no-sync python -c 'import sys; print(sys.executable)')"
          bash scripts/run_react_dashboard_smoke.sh
