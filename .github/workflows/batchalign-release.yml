# Release the public batchalign3 Python package and embedded CLI wheels to a
# GitHub Release (no PyPI). One abi3 wheel per platform plus the installer
# scripts and a checksum file are attached. Triggered by a v* tag push, or
# manually via workflow_dispatch with an existing tag. This does not release
# internal crates or the experimental desktop surfaces. For a dry-run packaging
# validation use installers/test-github-release.sh (a throwaway draft release).
name: Batchalign Release

run-name: batchalign3 ${{ inputs.tag || github.ref_name }}

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to (re)publish (e.g. v0.1.0)"
        required: true
      dry_run:
        description: "Build and smoke-test only; do not create the GitHub Release"
        type: boolean
        default: false

env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

concurrency:
  group: batchalign-package-release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate release tag exists and matches pyproject version
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          case "$RELEASE_TAG" in
            v*) ;;
            *)
              echo "::error::Release tag must start with v (got $RELEASE_TAG)"
              exit 1
              ;;
          esac

          git rev-parse "refs/tags/$RELEASE_TAG" >/dev/null 2>&1 || {
            echo "::error::Tag $RELEASE_TAG does not exist in the repository"
            exit 1
          }

          python3 - <<'PY'
          import os
          import sys
          import tomllib

          release_tag = os.environ["RELEASE_TAG"]
          with open("pyproject.toml", "rb") as f:
              pyproject = tomllib.load(f)
          package_version = pyproject["project"]["version"]
          tag_version = release_tag.removeprefix("v")
          if tag_version != package_version:
              print(
                  f"::error::Tag version ({tag_version}) does not match pyproject version ({package_version})"
              )
              sys.exit(1)
          print(f"Validated Batchalign preview release tag {release_tag}")
          PY

  build:
    needs: preflight
    name: Build wheels (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: "2_28"
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: "2_28"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # The batchalign crate's default features include `embed-dashboard`,
      # which `include_dir!`s frontend/dist at compile time and panics if it
      # is absent. Build the dashboard (static, arch-independent assets) on
      # the host before the CLI binary. For the Linux target the manylinux
      # container sees these files through the mounted workspace, so the
      # before-script-linux cargo build picks them up too.
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build dashboard frontend
        shell: bash
        run: cd frontend && npm ci && npm run build

      # The bundled batchalign3 CLI binary pulls in prost / tonic, which need
      # protoc at build time. The wheel itself (batchalign-pyo3) does not, so
      # protoc is installed only for the native CLI-binary build below (macOS
      # and Windows hosts); the Linux binary is built inside the manylinux
      # container, which gets protoc from before-script-linux.
      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf
      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc -y

      - name: Build CLI binary (macOS / Windows, native)
        if: runner.os != 'Linux'
        shell: bash
        run: |
          cargo build --release -p batchalign --target ${{ matrix.target }}
          mkdir -p batchalign/_bin
      - name: Stage CLI binary (macOS)
        if: runner.os == 'macOS'
        run: cp target/${{ matrix.target }}/release/batchalign3 batchalign/_bin/batchalign3
      - name: Stage CLI binary (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: cp "target/${{ matrix.target }}/release/batchalign3.exe" batchalign/_bin/batchalign3.exe

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || 'auto' }}
          args: --release --out dist
          before-script-linux: |
            set -euo pipefail
            # The manylinux container has no protoc; the bundled batchalign3
            # CLI binary's prost / tonic deps need it. protoc runs on the
            # x86_64 build host even when cross-compiling, so the x86_64
            # release is correct for both linux targets. matrix.target is
            # interpolated by Actions, so it is a literal here (not a shell
            # variable that set -u would reject). The x86_64 wheel uses an
            # AlmaLinux (dnf) image and the aarch64 cross build a Debian
            # (apt) one, so install unzip via whichever manager is present.
            if command -v dnf >/dev/null 2>&1; then
              dnf install -y unzip
            elif command -v apt-get >/dev/null 2>&1; then
              apt-get update -y && apt-get install -y unzip
            elif command -v yum >/dev/null 2>&1; then
              yum install -y unzip
            else
              echo "no supported package manager to install unzip" >&2
              exit 1
            fi
            curl -fsSL -o /tmp/protoc.zip \
              https://github.com/protocolbuffers/protobuf/releases/download/v35.1/protoc-35.1-linux-x86_64.zip
            unzip -o /tmp/protoc.zip -d /usr/local bin/protoc 'include/*'
            export PROTOC=/usr/local/bin/protoc
            cargo build --release -p batchalign --target "${{ matrix.target }}"
            mkdir -p batchalign/_bin
            cp "target/${{ matrix.target }}/release/batchalign3" batchalign/_bin/batchalign3
      - uses: actions/upload-artifact@v7
        with:
          name: wheel-${{ matrix.target }}
          path: dist/

  wheel-smoke:
    name: Wheel Smoke (${{ matrix.os }})
    needs: build
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          python-version: "3.12"
      - uses: actions/download-artifact@v8
        with:
          name: wheel-${{ matrix.target }}
          path: dist/
      - name: Install wheel in clean environment
        run: uv tool install --from dist/*.whl batchalign3
        shell: bash
      - name: Verify batchalign3 --help
        run: batchalign3 --help
      - name: Verify batchalign3 version
        run: batchalign3 version
      - name: Verify batchalign3 serve health (Unix only)
        if: runner.os != 'Windows'
        shell: bash
        env:
          BATCHALIGN_STATE_DIR: ${{ runner.temp }}/batchalign-state-${{ matrix.target }}
        run: |
          set -euo pipefail
          rm -rf "$BATCHALIGN_STATE_DIR"
          mkdir -p "$BATCHALIGN_STATE_DIR"
          trap 'batchalign3 serve stop || true' EXIT

          batchalign3 serve start \
            --host 127.0.0.1 \
            --port 18080 \
            --test-echo \
            --warmup off

          batchalign3 serve status --server http://127.0.0.1:18080

          python - <<'PY'
          import json
          import time
          import urllib.request

          url = "http://127.0.0.1:18080/health"
          last_error = None
          for _ in range(20):
              try:
                  with urllib.request.urlopen(url, timeout=5) as resp:
                      payload = json.load(resp)
                  assert payload["status"] == "ok", payload
                  print(f"health OK: version={payload['version']}")
                  break
              except Exception as exc:  # pragma: no cover - CI smoke only
                  last_error = exc
                  time.sleep(1)
          else:
              raise SystemExit(f"/health did not become ready: {last_error}")
          PY

  sdist:
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/

  github-release:
    needs: [preflight, build, sdist, wheel-smoke]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          pattern: "{wheel-*,sdist}"
          merge-multiple: true
          path: dist/
      - name: Stage installer scripts
        run: |
          cp installers/install-batchalign3.sh dist/
          cp installers/install-batchalign3.ps1 dist/
      - name: Checksums
        working-directory: dist
        run: shasum -a 256 ./*.whl ./*.tar.gz install-batchalign3.sh install-batchalign3.ps1 > sha256.sum
      - name: Create GitHub Release
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "$RELEASE_TAG" \
            --verify-tag \
            --title "batchalign3 $RELEASE_TAG" \
            --generate-notes \
            dist/*
