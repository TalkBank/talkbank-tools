# Preview release line for the public `batchalign3` Python package and embedded
# CLI wheels. This does not release internal crates or the experimental desktop
# surfaces. Set both publish toggles false for a dry-run packaging validation.
name: Batchalign Package Release (Preview)

run-name: Batchalign preview ${{ inputs.tag }}

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish for the preview package (e.g. v0.1.0)"
        required: true
      publish_pypi:
        description: "Publish preview package to PyPI"
        type: boolean
        default: true
      publish_github:
        description: "Create GitHub Release with wheels and sdist"
        type: boolean
        default: true

env:
  RELEASE_TAG: ${{ inputs.tag }}

concurrency:
  group: batchalign-package-release-${{ inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate release tag exists and matches pyproject version
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          case "$RELEASE_TAG" in
            v*) ;;
            *)
              echo "::error::Release tag must start with v (got $RELEASE_TAG)"
              exit 1
              ;;
          esac

          git rev-parse "refs/tags/$RELEASE_TAG" >/dev/null 2>&1 || {
            echo "::error::Tag $RELEASE_TAG does not exist in the repository"
            exit 1
          }

          python3 - <<'PY'
          import os
          import sys
          import tomllib

          release_tag = os.environ["RELEASE_TAG"]
          with open("pyproject.toml", "rb") as f:
              pyproject = tomllib.load(f)
          package_version = pyproject["project"]["version"]
          tag_version = release_tag.removeprefix("v")
          if tag_version != package_version:
              print(
                  f"::error::Tag version ({tag_version}) does not match pyproject version ({package_version})"
              )
              sys.exit(1)
          print(f"Validated Batchalign preview release tag {release_tag}")
          PY

  build:
    needs: preflight
    name: Build wheels (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: "2_28"
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: "2_28"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build CLI binary (macOS / Windows — native)
        if: runner.os != 'Linux'
        run: |
          cargo build --release -p batchalign-cli --target ${{ matrix.target }}
          mkdir -p batchalign/_bin
      - name: Stage CLI binary (macOS)
        if: runner.os == 'macOS'
        run: cp target/${{ matrix.target }}/release/batchalign3 batchalign/_bin/batchalign3
      - name: Stage CLI binary (Windows)
        if: runner.os == 'Windows'
        run: copy target\${{ matrix.target }}\release\batchalign3.exe batchalign\_bin\batchalign3.exe

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || 'auto' }}
          args: --release --out dist
          before-script-linux: |
            set -euo pipefail
            cargo build --release -p batchalign-cli --target "$MATURIN_TARGET"
            mkdir -p batchalign/_bin
            cp "target/${MATURIN_TARGET}/release/batchalign3" batchalign/_bin/batchalign3
      - uses: actions/upload-artifact@v6
        with:
          name: wheel-${{ matrix.target }}
          path: dist/

  wheel-smoke:
    name: Wheel Smoke (${{ matrix.os }})
    needs: build
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"
      - uses: actions/download-artifact@v6
        with:
          name: wheel-${{ matrix.target }}
          path: dist/
      - name: Install wheel in clean environment
        run: uv tool install --from dist/*.whl batchalign3
        shell: bash
      - name: Verify batchalign3 --help
        run: batchalign3 --help
      - name: Verify batchalign3 version
        run: batchalign3 version
      - name: Verify batchalign3 serve health (Unix only)
        if: runner.os != 'Windows'
        shell: bash
        env:
          BATCHALIGN_STATE_DIR: ${{ runner.temp }}/batchalign-state-${{ matrix.target }}
        run: |
          set -euo pipefail
          rm -rf "$BATCHALIGN_STATE_DIR"
          mkdir -p "$BATCHALIGN_STATE_DIR"
          trap 'batchalign3 serve stop || true' EXIT

          batchalign3 serve start \
            --host 127.0.0.1 \
            --port 18080 \
            --test-echo \
            --warmup off

          batchalign3 serve status --server http://127.0.0.1:18080

          python - <<'PY'
          import json
          import time
          import urllib.request

          url = "http://127.0.0.1:18080/health"
          last_error = None
          for _ in range(20):
              try:
                  with urllib.request.urlopen(url, timeout=5) as resp:
                      payload = json.load(resp)
                  assert payload["status"] == "ok", payload
                  print(f"health OK: version={payload['version']}")
                  break
              except Exception as exc:  # pragma: no cover - CI smoke only
                  last_error = exc
                  time.sleep(1)
          else:
              raise SystemExit(f"/health did not become ready: {last_error}")
          PY

  sdist:
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v6
        with:
          name: sdist
          path: dist/

  github-release:
    if: inputs.publish_github
    needs: [preflight, build, sdist, wheel-smoke]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v6
        with:
          pattern: "{wheel-*,sdist}"
          merge-multiple: true
          path: dist/
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "${{ env.RELEASE_TAG }}" \
            --verify-tag \
            --title "Batchalign Preview ${{ env.RELEASE_TAG }}" \
            --generate-notes \
            dist/*

  publish-pypi:
    if: inputs.publish_pypi
    needs: [preflight, build, sdist, wheel-smoke]
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v6
        with:
          pattern: "{wheel-*,sdist}"
          merge-multiple: true
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
