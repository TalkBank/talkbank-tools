name: Batchalign Rust

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  batchalign-rust:
    name: Imported Batchalign Rust
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc + ripgrep
        # ripgrep is required by the Phase α architectural-invariant
        # test (memory_tier_is_sole_source_for_per_profile_envelopes)
        # which shells out to rg to scan production sources for
        # parallel *_startup_mb definitions. Install explicitly so the
        # test does not depend on the runner image version.
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler ripgrep

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build dashboard assets
        run: make batchalign-dashboard-build

      - name: Run imported Batchalign Rust CI gate
        run: make batchalign-ci-rust

  batchalign-pyo3:
    name: Imported Batchalign PyO3
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            pyo3 -> pyo3/target

      - name: Build imported standalone PyO3 crate
        run: make batchalign-build-pyo3
