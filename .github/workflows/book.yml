name: TalkBank Toolchain mdBook

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/book.yml'
      - 'book/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/book.yml'
      - 'book/**'
  workflow_dispatch:

# Least privilege at the top; the deploy job widens its own scope below.
permissions:
  contents: read

# One Pages deployment at a time; never cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build TalkBank Toolchain mdBook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      # Book toolchain. mdBook + mdbook-mermaid are pinned to the 0.4.x era:
      # the mermaid preprocessor is protocol-sensitive to mdBook's wire format
      # and no released mdbook-mermaid supports mdBook 0.5. Link-checking is
      # decoupled onto lychee, which runs on the built HTML and is independent
      # of mdBook's wire format (the old mdbook-linkcheck2 renderer only
      # accepts mdBook 0.5's `items` RenderContext, which 0.4.x does not emit).
      - name: Install mdbook + mdbook-mermaid + lychee
        run: |
          cargo install \
            mdbook@0.4.52 \
            mdbook-mermaid@0.16.2 \
            lychee@0.24.2 \
            --locked
      - name: Build book
        run: mdbook build book
      - name: Link-check book (lychee, offline)
        run: lychee --offline --root-dir "${GITHUB_WORKSPACE}/book/build" "${GITHUB_WORKSPACE}/book/build"
      - name: Test book code blocks (fence-shape regression guard)
        # Every Rust block in the book is currently rust,ignore (mdbook
        # test can't disambiguate workspace crate variants in
        # target/debug/deps/, so executable doctest verification lives
        # in crates/<crate>/tests/book_*_examples.rs files instead).
        # This step is a guard against untagged ``` fences or stray
        # ``` rust blocks creeping back in.
        run: mdbook test book
      - name: Upload book artifact
        uses: actions/upload-artifact@v7
        with:
          name: talkbank-toolchain-book
          path: book/build/
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: book/build

  deploy:
    name: Deploy book to GitHub Pages
    needs: build
    # Build on PRs for validation; only publish on push to main / dispatch.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
