name: CI

# Cross-cutting repo hygiene for the batchalign3 workspace. The CHAT-format
# gates (parser/spec/grammar/corpus/generated-artifacts/fuzz/parser-equivalence)
# moved to the chatter repo, which is now the single home for the CHAT core. The
# batchalign Rust / PyO3 compile + test gate lives in batchalign-rust.yml; the
# Python and desktop gates in batchalign-python.yml / batchalign-desktop.yml; the
# mdBook build in book.yml.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Generate lockfile
        run: cargo generate-lockfile

      - name: Run RustSec audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: Run cargo-deny
        run: cargo deny check

  shellcheck:
    name: Shell scripts (shellcheck, strictest)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Pin shellcheck to the current latest release instead of the
      # distro-shipped one. ubuntu-latest's apt shellcheck lags, and its
      # older SC2317 ("unreachable command") logic false-positives on
      # indirectly invoked functions (e.g. scripts/temporal-stress-test.sh)
      # that current shellcheck no longer flags. Per the CI policy, use the
      # latest tool. Latest: https://github.com/koalaman/shellcheck/releases
      - name: Install shellcheck (pinned latest)
        env:
          SHELLCHECK_VERSION: v0.11.0
        run: |
          cd "$RUNNER_TEMP"
          curl -fsSL "https://github.com/koalaman/shellcheck/releases/download/${SHELLCHECK_VERSION}/shellcheck-${SHELLCHECK_VERSION}.linux.x86_64.tar.xz" -o shellcheck.tar.xz
          tar -xJf shellcheck.tar.xz
          sudo install "shellcheck-${SHELLCHECK_VERSION}/shellcheck" /usr/local/bin/shellcheck
          shellcheck --version

      # Every tracked shell script must pass shellcheck at its default
      # (strictest) severity. The runner finds every *.sh plus shebang
      # scripts via git ls-files. See CLAUDE.md.
      - name: shellcheck all shell scripts
        run: bash scripts/lint/shellcheck-all.sh

  ci-report:
    name: CI Gate Summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - dependency-audit
      - shellcheck

    steps:
      - name: Write gate summary
        run: |
          result_to_badge() {
            case "$1" in
              success)   echo "passed" ;;
              failure)   echo "failed" ;;
              cancelled) echo "cancelled" ;;
              skipped)   echo "skipped" ;;
              *)         echo "$1" ;;
            esac
          }

          {
            echo "## CI Gate Results"
            echo ""
            echo "| Gate | Result |"
            echo "|------|--------|"
            echo "| Dependency audit (RustSec + cargo-deny) | $(result_to_badge '${{ needs.dependency-audit.result }}') |"
            echo "| Shell scripts (shellcheck, strictest) | $(result_to_badge '${{ needs.shellcheck.result }}') |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          # Single merge-gate: fail if any dependency failed or was cancelled.
          if [[ "${{ needs.dependency-audit.result }}" != "success" ||
                "${{ needs.shellcheck.result }}"        != "success" ]]; then
              echo "### One or more gates failed, see job logs above" >> "$GITHUB_STEP_SUMMARY"
              exit 1
          fi

          echo "### All gates passed" >> "$GITHUB_STEP_SUMMARY"
