# Canonical GitHub release line for the shared Rust workspace. This publishes the
# public-stable `chatter` CLI plus the preview `talkbank-lsp` binary built from
# the same workspace version. It intentionally does not cargo-publish the
# library crates; those remain source-first preview surfaces until a dedicated
# crates.io workflow and publish-ready helper-crate chain exist. Batchalign, VS
# Code, and desktop surfaces ship via their own release workflows.
name: TalkBank Core Release

run-name: Core release ${{ inputs.tag || github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to release (e.g. v0.1.0)"
        required: true
  # Uncomment when ready for automated releases:
  # push:
  #   tags:
  #     - "v*"

env:
  # Canonical release tag: use the manual input when dispatched, fall back
  # to the pushed ref (for future tag-triggered runs).
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

concurrency:
  group: talkbank-core-release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate release tag exists and matches workspace version
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          case "$RELEASE_TAG" in
            v*) ;;
            *)
              echo "::error::Release tag must start with v (got $RELEASE_TAG)"
              exit 1
              ;;
          esac

          git rev-parse "refs/tags/$RELEASE_TAG" >/dev/null 2>&1 || {
            echo "::error::Tag $RELEASE_TAG does not exist in the repository"
            exit 1
          }

          python3 - <<'PY'
          import os
          import sys
          import tomllib

          release_tag = os.environ["RELEASE_TAG"]
          with open("Cargo.toml", "rb") as f:
              cargo = tomllib.load(f)
          workspace_version = cargo["workspace"]["package"]["version"]
          tag_version = release_tag.removeprefix("v")
          if tag_version != workspace_version:
              print(
                  f"::error::Tag version ({tag_version}) does not match workspace version ({workspace_version})"
              )
              sys.exit(1)
          print(f"Validated TalkBank core release tag {release_tag}")
          PY

  build:
    needs: preflight
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }} -p talkbank-cli -p talkbank-lsp

      - name: Smoke test — chatter --help (native only)
        if: >-
          (runner.os == 'Linux' && matrix.target == 'x86_64-unknown-linux-gnu') ||
          (runner.os == 'macOS' && matrix.target == 'aarch64-apple-darwin')
        run: ./target/${{ matrix.target }}/release/chatter --help

      - name: Smoke test — chatter --version (native only)
        if: >-
          (runner.os == 'Linux' && matrix.target == 'x86_64-unknown-linux-gnu') ||
          (runner.os == 'macOS' && matrix.target == 'aarch64-apple-darwin')
        run: ./target/${{ matrix.target }}/release/chatter --version

      - name: Smoke test — chatter --help (Windows)
        if: runner.os == 'Windows'
        run: .\target\${{ matrix.target }}\release\chatter.exe --help

      - name: Smoke test — chatter --version (Windows)
        if: runner.os == 'Windows'
        run: .\target\${{ matrix.target }}\release\chatter.exe --version

      - name: Package archive (Unix)
        if: runner.os != 'Windows'
        run: |
          VERSION="${RELEASE_TAG#v}"
          ARCHIVE="chatter-v${VERSION}-${{ matrix.target }}.tar.gz"
          tar czf "${ARCHIVE}" \
            -C target/${{ matrix.target }}/release \
            chatter talkbank-lsp
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = "${{ env.RELEASE_TAG }}".TrimStart("v")
          $ARCHIVE = "chatter-v${VERSION}-${{ matrix.target }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/chatter.exe","target/${{ matrix.target }}/release/talkbank-lsp.exe" -DestinationPath $ARCHIVE
          echo "ARCHIVE=${ARCHIVE}" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: chatter-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  release:
    name: Create Release
    needs: [preflight, build]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: chatter-*
          merge-multiple: true
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: TalkBank Core ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: dist/*
