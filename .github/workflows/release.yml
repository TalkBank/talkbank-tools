name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to release (e.g. v0.1.0)"
        required: true
  # Uncomment when ready for automated releases:
  # push:
  #   tags:
  #     - "v*"

env:
  # Canonical release tag: use the manual input when dispatched, fall back
  # to the pushed ref (for future tag-triggered runs).
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }} -p talkbank-cli -p talkbank-lsp

      - name: Smoke test — chatter --help (native only)
        if: >-
          (runner.os == 'Linux' && matrix.target == 'x86_64-unknown-linux-gnu') ||
          (runner.os == 'macOS' && matrix.target == 'aarch64-apple-darwin')
        run: ./target/${{ matrix.target }}/release/chatter --help

      - name: Smoke test — chatter --version (native only)
        if: >-
          (runner.os == 'Linux' && matrix.target == 'x86_64-unknown-linux-gnu') ||
          (runner.os == 'macOS' && matrix.target == 'aarch64-apple-darwin')
        run: ./target/${{ matrix.target }}/release/chatter --version

      - name: Smoke test — chatter --help (Windows)
        if: runner.os == 'Windows'
        run: .\target\${{ matrix.target }}\release\chatter.exe --help

      - name: Smoke test — chatter --version (Windows)
        if: runner.os == 'Windows'
        run: .\target\${{ matrix.target }}\release\chatter.exe --version

      - name: Package archive (Unix)
        if: runner.os != 'Windows'
        run: |
          VERSION="${RELEASE_TAG#v}"
          ARCHIVE="chatter-v${VERSION}-${{ matrix.target }}.tar.gz"
          tar czf "${ARCHIVE}" \
            -C target/${{ matrix.target }}/release \
            chatter talkbank-lsp
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = "${{ env.RELEASE_TAG }}".TrimStart("v")
          $ARCHIVE = "chatter-v${VERSION}-${{ matrix.target }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/chatter.exe","target/${{ matrix.target }}/release/talkbank-lsp.exe" -DestinationPath $ARCHIVE
          echo "ARCHIVE=${ARCHIVE}" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: chatter-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Validate tag version matches workspace version
        run: |
          TAG_VERSION="${RELEASE_TAG#v}"
          CARGO_VERSION=$(cargo metadata --format-version=1 --no-deps \
            | jq -r '.packages[] | select(.name == "talkbank-cli") | .version')
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag version (${TAG_VERSION}) does not match workspace version (${CARGO_VERSION})"
            exit 1
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: chatter-*
          merge-multiple: true
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
