[book]
title = "TalkBank Toolchain"
authors = ["TalkBank Contributors"]
description = "Unified user, developer, and architecture documentation for the TalkBank toolchain: chatter, Batchalign3, the VS Code extension, and the CLAN command reimplementation."
language = "en"
src = "src"

[build]
build-dir = "build"
create-missing = false

[preprocessor.mermaid]
command = "mdbook-mermaid"

[output.linkcheck2]
follow-web-links = false
traverse-parent-directories = false
warning-policy = "error"

[output.html]
git-repository-url = "https://github.com/TalkBank/talkbank-tools"
edit-url-template = "https://github.com/TalkBank/talkbank-tools/edit/main/book/{path}"
