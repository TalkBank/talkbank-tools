# cargo-deny configuration (workspace root)
# https://embarkstudios.github.io/cargo-deny/

# Unmaintained advisories are informational (not vulnerabilities). Scope them
# to "workspace" so they flag only crates a workspace member depends on
# directly. Deep transitive unmaintained deps we cannot act on (gtk-rs via
# Tauri's Linux backend, unic-* / instant / backoff / proc-macro-error via
# transitive chains, bincode/yaml-rust via syntect -> comrak) would otherwise
# block CI on issues outside our control. Real vulnerabilities are unaffected
# by this scope and still fail the audit at any depth.
[advisories]
unmaintained = "workspace"
ignore = [
    # rsa Marvin Attack timing side-channel (RUSTSEC-2023-0071). No patched
    # release upstream; only ever reachable transitively and not exploitable in
    # our usage. Kept defensively in case it re-enters the dependency tree.
    "RUSTSEC-2023-0071",
]

[licenses]
allow = [
    "MIT",
    "MIT-0",
    "MITNFA",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "BSL-1.0",
    "OpenSSL",
    "CC0-1.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    # BSD Zero Clause (public-domain-equivalent permissive); enum-iterator +
    # enum-iterator-derive.
    "0BSD",
]

[bans]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
# The CHAT core is consumed from the published, public chatter repo via git-tag
# deps (see Cargo.toml [workspace.dependencies]); allow that one git source.
allow-git = ["https://github.com/TalkBank/chatter"]
