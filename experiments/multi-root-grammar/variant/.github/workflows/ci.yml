name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Core CI validates grammar generation/tests plus Node and Rust bindings.
  # Python bindings are optional and intentionally not required for core grammar CI.
  test:
    name: Grammar tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm install
      - name: Verify generated parser is up to date
        run: |
          npx tree-sitter generate
          git diff --exit-code src/parser.c src/grammar.json src/node-types.json
      - name: Run tree-sitter tests
        run: npx tree-sitter test
      - name: Validate highlight and editor queries
        run: |
          for query_file in queries/*.scm; do
            npx tree-sitter query "$query_file" test/corpus/main_tier/simple_utterance.txt >/dev/null
          done

  wasm-build:
    name: WASM build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm install
      - name: Build WASM parser
        run: npx tree-sitter build --wasm
      - name: Verify WASM artifact exists
        run: test -f tree-sitter-talkbank.wasm

  node-test:
    name: Node.js binding
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm install
      - run: npm install tree-sitter
      - run: npm test

  rust-test:
    name: Rust binding
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm install
      - name: Generate parser
        run: npx tree-sitter generate
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test

  coverage:
    name: Code Coverage (Rust bindings)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm install
      - name: Generate parser
        run: npx tree-sitter generate
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate Rust coverage
        run: cargo llvm-cov test --lcov --output-path lcov.info
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          flags: rust
          token: ${{ secrets.CODECOV_TOKEN }}

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: npm audit
        run: |
          npm install
          npm audit --omit=dev --audit-level=high
      - uses: dtolnay/rust-toolchain@stable
      - name: RustSec audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
