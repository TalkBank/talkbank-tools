# cargo-mutants configuration
# Run: cargo mutants -p talkbank-direct-parser --timeout 60 -- --lib

# Exclude functions that are inherently hard to test at unit level
# (CA omission detection needs full file context with @Options: CA)
[[exclude_re]]
function = "find_context_dependent_ca_omission_span"

[[exclude_re]]
function = "report_context_dependent_main_tier_error"

# Exclude parser_name (string identity, not behavioral)
[[exclude_re]]
function = "parser_name"

# Exclude Default impl (trivial)
[[exclude_re]]
function = "<impl Default for DirectParser>"
