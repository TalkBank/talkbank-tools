[book]
title = "TalkBank CHAT Editor"
authors = ["TalkBank Contributors"]
description = "User guide, tutorials, and reference for the TalkBank VS Code extension"
language = "en"
src = "src"

[build]
build-dir = "build"
create-missing = false

[preprocessor.mermaid]
command = "mdbook-mermaid"

[output.linkcheck2]
follow-web-links = false
traverse-parent-directories = false
warning-policy = "warn"

[output.html]
git-repository-url = "https://github.com/TalkBank/talkbank-tools"
edit-url-template = "https://github.com/TalkBank/talkbank-tools/edit/main/vscode/book/{path}"
