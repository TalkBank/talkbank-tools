<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis Results</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'EB Garamond', Georgia, serif;
            background: var(--vscode-editor-background);
            color: var(--vscode-editor-foreground);
            padding: 32px 24px 56px;
            font-size: 15px;
            line-height: 1.6;
            max-width: 920px;
        }

        /* -- Header ------------------------------------------------------- */
        .cmd-eyebrow {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 10px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--vscode-descriptionForeground);
            opacity: 0.7;
            margin-bottom: 8px;
        }

        .cmd-display {
            font-family: 'EB Garamond', Georgia, serif;
            font-size: 38px;
            font-weight: 600;
            line-height: 1.05;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }

        .cmd-description {
            font-family: 'EB Garamond', Georgia, serif;
            font-style: italic;
            font-size: 16px;
            color: var(--vscode-descriptionForeground);
            margin-bottom: 6px;
        }

        .file-name {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 11px;
            color: var(--vscode-descriptionForeground);
            opacity: 0.55;
            margin-bottom: 0;
        }

        .header-rule {
            border: none;
            border-top: 1px solid var(--vscode-panel-border);
            margin: 24px 0 32px;
            opacity: 0.45;
        }

        /* -- Section ------------------------------------------------------ */
        .section {
            margin-bottom: 40px;
        }

        .section-header {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 14px;
            padding-left: 13px;
            border-left: 3px solid var(--section-color, var(--vscode-textLink-foreground));
        }

        .section-title {
            font-family: 'EB Garamond', Georgia, serif;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.01em;
            line-height: 1.2;
        }

        .speaker-badge {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 2px 7px 3px;
            border-radius: 3px;
            color: var(--section-color, var(--vscode-textLink-foreground));
            border: 1px solid var(--section-color, var(--vscode-textLink-foreground));
            opacity: 0.85;
            white-space: nowrap;
        }

        .sub-section-label {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 10px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--vscode-descriptionForeground);
            opacity: 0.7;
            margin: 16px 0 8px;
        }

        /* -- Stat cards --------------------------------------------------- */
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-card {
            border: 1px solid color-mix(in srgb, var(--vscode-panel-border) 70%, transparent);
            border-radius: 4px;
            padding: 12px 14px 14px;
            background: color-mix(in srgb, var(--vscode-editor-foreground) 3%, transparent);
        }

        .stat-key {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 9.5px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--vscode-descriptionForeground);
            opacity: 0.8;
            margin-bottom: 7px;
        }

        .stat-value {
            font-family: 'EB Garamond', Georgia, serif;
            font-size: 28px;
            font-weight: 600;
            line-height: 1;
            color: var(--section-color, var(--vscode-editor-foreground));
        }

        .stat-value.plain {
            font-size: 16px;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-weight: 400;
            line-height: 1.3;
            word-break: break-all;
        }

        /* -- Table -------------------------------------------------------- */
        table {
            border-collapse: collapse;
            width: 100%;
            margin-bottom: 10px;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 12px;
        }

        th {
            text-align: left;
            padding: 6px 14px 6px 6px;
            border-bottom: 1px solid var(--vscode-panel-border);
            font-size: 9.5px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--vscode-descriptionForeground);
            font-weight: 500;
            opacity: 0.75;
            white-space: nowrap;
        }

        td {
            padding: 5px 14px 5px 6px;
            border-bottom: 1px solid color-mix(in srgb, var(--vscode-panel-border) 35%, transparent);
            font-variant-numeric: tabular-nums;
        }

        tr:last-child td { border-bottom: none; }

        tr:hover td { background: var(--vscode-list-hoverBackground); }

        /* bar chart overlay on the last numeric column */
        .td-bar {
            background-image: var(--bar-gradient);
            background-repeat: no-repeat;
            background-size: 100% 100%;
        }

        .truncation-notice {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 10.5px;
            color: var(--vscode-descriptionForeground);
            font-style: italic;
            padding: 6px 6px 0;
            opacity: 0.65;
        }

        pre {
            background: var(--vscode-textCodeBlock-background);
            padding: 16px;
            border-radius: 4px;
            overflow: auto;
            font-size: 12px;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            line-height: 1.5;
        }

        .empty {
            color: var(--vscode-descriptionForeground);
            font-style: italic;
            font-family: 'EB Garamond', Georgia, serif;
            padding: 6px 0;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn-run {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 11px;
            letter-spacing: 0.05em;
            padding: 7px 20px;
            border: none;
            border-radius: 3px;
            background: var(--vscode-button-background);
            color: var(--vscode-button-foreground);
            cursor: pointer;
            white-space: nowrap;
        }

        .btn-run:hover { background: var(--vscode-button-hoverBackground); }
        .btn-run:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="cmd-eyebrow" id="cmd-eyebrow"></div>
    <h1 class="cmd-display" id="cmd-display"></h1>
    <p class="cmd-description" id="cmd-description"></p>
    <p class="file-name" id="file-name"></p>
    <hr class="header-rule">
    <div class="btn-row" style="margin-bottom: 20px;">
        <button class="btn-run" id="btn-export-csv">Export CSV</button>
    </div>
    <div id="content"></div>

<!--INJECT_DATA-->
<!--INJECT_SCRIPT-->
</body>
</html>
