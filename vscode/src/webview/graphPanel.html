<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dependency Graph</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            background: var(--vscode-editor-background);
            color: var(--vscode-editor-foreground);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* -- Toolbar ------------------------------------------------------ */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 6px 10px;
            border-bottom: 1px solid color-mix(in srgb, var(--vscode-panel-border) 55%, transparent);
            flex-shrink: 0;
            background: color-mix(in srgb, var(--vscode-editor-background) 85%, var(--vscode-panel-background));
        }

        .tb-btn {
            background: transparent;
            color: var(--vscode-editor-foreground);
            border: 1px solid color-mix(in srgb, var(--vscode-panel-border) 60%, transparent);
            width: 26px;
            height: 26px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 100ms;
        }
        .tb-btn:hover { background: var(--vscode-list-hoverBackground); }
        .tb-btn:active { opacity: 0.7; }
        .tb-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .tb-sep {
            width: 1px;
            height: 18px;
            background: color-mix(in srgb, var(--vscode-panel-border) 60%, transparent);
            margin: 0 4px;
        }

        .tb-zoom-label {
            font-size: 10px;
            color: var(--vscode-descriptionForeground);
            min-width: 34px;
            text-align: right;
            opacity: 0.8;
            font-variant-numeric: tabular-nums;
        }

        .tb-slider {
            flex: 1;
            max-width: 100px;
            accent-color: var(--vscode-textLink-foreground, #4ec9b0);
            cursor: pointer;
        }

        .tb-dl-btn {
            font-size: 9.5px;
            letter-spacing: 0.05em;
            width: auto;
            padding: 0 7px;
            height: 26px;
            color: var(--vscode-descriptionForeground);
        }

        /* -- Graph area --------------------------------------------------- */
        .graph-container {
            flex: 1;
            overflow: hidden;
            position: relative;
            cursor: grab;
            user-select: none;
        }
        .graph-container.dragging { cursor: grabbing; }

        #content {
            position: absolute;
            top: 0; left: 0;
            transform-origin: 0 0;
            /* transform is set by JS */
        }

        svg {
            max-width: none;
            display: block;
        }

        .error {
            background: var(--vscode-inputValidation-errorBackground);
            color: var(--vscode-inputValidation-errorForeground);
            border: 1px solid var(--vscode-inputValidation-errorBorder);
            padding: 12px 16px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-width: 520px;
            margin: 40px auto;
        }

        .loading {
            color: var(--vscode-descriptionForeground);
            font-size: 12px;
            letter-spacing: 0.08em;
            opacity: 0.6;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <button class="tb-btn" id="zoomOutBtn" title="Zoom out">&minus;</button>
        <input type="range" class="tb-slider" id="zoomSlider" min="10" max="400" value="100" title="Zoom">
        <button class="tb-btn" id="zoomInBtn" title="Zoom in">+</button>
        <span class="tb-zoom-label" id="zoomLevel">100%</span>
        <div class="tb-sep"></div>
        <button class="tb-btn" id="fitBtn" title="Fit to window">&#x26F6;</button>
        <button class="tb-btn" id="resetPanBtn" title="Reset pan">&#x2316;</button>
        <div class="tb-sep"></div>
        <button class="tb-btn tb-dl-btn" id="downloadSvgBtn" title="Download SVG">SVG &darr;</button>
        <button class="tb-btn tb-dl-btn" id="downloadPngBtn" title="Download PNG">PNG &darr;</button>
    </div>

    <div class="graph-container" id="graphContainer">
        <div id="content"><div class="loading">Rendering graph&#x2026;</div></div>
    </div>

<!--INJECT_DATA-->
<!--INJECT_SCRIPT-->
</body>
</html>
