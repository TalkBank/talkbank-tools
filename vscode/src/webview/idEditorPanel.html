<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Participant Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'EB Garamond', Georgia, serif;
            background: var(--vscode-editor-background);
            color: var(--vscode-editor-foreground);
            padding: 32px 24px 56px;
            font-size: 15px;
            line-height: 1.6;
            max-width: 1100px;
        }

        .cmd-eyebrow {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 10px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--vscode-descriptionForeground);
            opacity: 0.7;
            margin-bottom: 8px;
        }

        .cmd-display {
            font-family: 'EB Garamond', Georgia, serif;
            font-size: 38px;
            font-weight: 600;
            line-height: 1.05;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }

        .cmd-description {
            font-family: 'EB Garamond', Georgia, serif;
            font-style: italic;
            font-size: 16px;
            color: var(--vscode-descriptionForeground);
            margin-bottom: 6px;
        }

        .file-name {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 11px;
            color: var(--vscode-descriptionForeground);
            opacity: 0.55;
        }

        .header-rule {
            border: none;
            border-top: 1px solid var(--vscode-panel-border);
            margin: 24px 0 28px;
            opacity: 0.45;
        }

        /* -- Participant card --------------------------------------------- */
        .participant {
            border: 1px solid var(--vscode-panel-border);
            border-radius: 6px;
            padding: 20px 24px;
            margin-bottom: 20px;
            background: color-mix(in srgb, var(--vscode-editor-foreground) 3%, transparent);
            border-left: 3px solid var(--accent-color, var(--vscode-textLink-foreground));
        }

        .participant-header {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 16px;
        }

        .participant-code {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 0.05em;
        }

        .participant-role {
            font-family: 'EB Garamond', Georgia, serif;
            font-style: italic;
            font-size: 15px;
            color: var(--vscode-descriptionForeground);
        }

        .field-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .field-label {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 9.5px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--vscode-descriptionForeground);
            opacity: 0.8;
        }

        input, select {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 12px;
            padding: 5px 8px;
            border: 1px solid var(--vscode-input-border, var(--vscode-panel-border));
            border-radius: 3px;
            background: var(--vscode-input-background);
            color: var(--vscode-input-foreground);
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--vscode-focusBorder);
        }

        input.required {
            border-left: 2px solid var(--accent-color, var(--vscode-textLink-foreground));
        }

        /* -- Buttons ------------------------------------------------------ */
        .btn-bar {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-top: 8px;
        }

        .btn-save {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 11px;
            letter-spacing: 0.05em;
            padding: 8px 24px;
            border: none;
            border-radius: 3px;
            background: var(--vscode-button-background);
            color: var(--vscode-button-foreground);
            cursor: pointer;
        }

        .btn-save:hover { background: var(--vscode-button-hoverBackground); }

        .status {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 11px;
            color: var(--vscode-descriptionForeground);
        }

        .status.error { color: var(--vscode-errorForeground); }
        .status.success { color: #4ec9b0; }

        .empty {
            color: var(--vscode-descriptionForeground);
            font-style: italic;
            padding: 20px 0;
        }
    </style>
</head>
<body>
    <div class="cmd-eyebrow">CHAT Header Editor</div>
    <h1 class="cmd-display">Participants</h1>
    <p class="cmd-description">Edit @ID headers for each participant</p>
    <p class="file-name" id="file-name"></p>
    <hr class="header-rule">

    <div id="entries"></div>

    <div class="btn-bar">
        <button class="btn-save" id="btn-save">Save Changes</button>
        <span class="status" id="status"></span>
    </div>

<!--INJECT_SCRIPT-->
</body>
</html>
