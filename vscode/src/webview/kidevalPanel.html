<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KidEval</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'EB Garamond', Georgia, serif;
            background: var(--vscode-editor-background);
            color: var(--vscode-editor-foreground);
            padding: 32px 24px 56px;
            font-size: 15px;
            line-height: 1.6;
            max-width: 1100px;
        }

        /* -- Header ------------------------------------------------------- */
        .cmd-eyebrow {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 10px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--vscode-descriptionForeground);
            opacity: 0.7;
            margin-bottom: 8px;
        }

        .cmd-display {
            font-family: 'EB Garamond', Georgia, serif;
            font-size: 38px;
            font-weight: 600;
            line-height: 1.05;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }

        .cmd-description {
            font-family: 'EB Garamond', Georgia, serif;
            font-style: italic;
            font-size: 16px;
            color: var(--vscode-descriptionForeground);
            margin-bottom: 6px;
        }

        .file-name {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 11px;
            color: var(--vscode-descriptionForeground);
            opacity: 0.55;
        }

        .header-rule {
            border: none;
            border-top: 1px solid var(--vscode-panel-border);
            margin: 24px 0 28px;
            opacity: 0.45;
        }

        /* -- Config panel ------------------------------------------------- */
        .config-panel {
            border: 1px solid var(--vscode-panel-border);
            border-radius: 6px;
            padding: 20px 24px;
            margin-bottom: 28px;
            background: color-mix(in srgb, var(--vscode-editor-foreground) 3%, transparent);
        }

        .config-title {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 10px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--vscode-descriptionForeground);
            margin-bottom: 16px;
        }

        .config-row {
            display: flex;
            gap: 16px;
            align-items: flex-end;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .config-field {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 140px;
        }

        .config-field.wide { flex: 1; min-width: 260px; }

        .config-label {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 10px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--vscode-descriptionForeground);
            opacity: 0.8;
        }

        select, input[type="number"] {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 12px;
            padding: 6px 10px;
            border: 1px solid var(--vscode-input-border, var(--vscode-panel-border));
            border-radius: 3px;
            background: var(--vscode-input-background);
            color: var(--vscode-input-foreground);
            outline: none;
        }

        select:focus, input[type="number"]:focus {
            border-color: var(--vscode-focusBorder);
        }

        input[type="number"] { width: 80px; }

        .btn-run {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 11px;
            letter-spacing: 0.05em;
            padding: 7px 20px;
            border: none;
            border-radius: 3px;
            background: var(--vscode-button-background);
            color: var(--vscode-button-foreground);
            cursor: pointer;
            white-space: nowrap;
        }

        .btn-run:hover { background: var(--vscode-button-hoverBackground); }
        .btn-run:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-run-no-db {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 11px;
            padding: 7px 16px;
            border: 1px solid var(--vscode-button-background);
            border-radius: 3px;
            background: transparent;
            color: var(--vscode-button-background);
            cursor: pointer;
            white-space: nowrap;
        }

        .btn-run-no-db:hover {
            background: color-mix(in srgb, var(--vscode-button-background) 15%, transparent);
        }

        .btn-row {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-top: 6px;
        }

        /* -- Status ------------------------------------------------------- */
        .status {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 11px;
            color: var(--vscode-descriptionForeground);
            padding: 8px 0;
        }

        .status.error { color: var(--vscode-errorForeground); }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid var(--vscode-descriptionForeground);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 6px;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* -- Results ------------------------------------------------------ */
        .section {
            margin-bottom: 40px;
        }

        .section-header {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 14px;
            padding-left: 13px;
            border-left: 3px solid var(--section-color, var(--vscode-textLink-foreground));
        }

        .section-title {
            font-family: 'EB Garamond', Georgia, serif;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.01em;
            line-height: 1.2;
        }

        .speaker-badge {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 2px 7px 3px;
            border-radius: 3px;
            color: var(--section-color, var(--vscode-textLink-foreground));
            border: 1px solid var(--section-color, var(--vscode-textLink-foreground));
            opacity: 0.85;
            white-space: nowrap;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-card {
            border: 1px solid color-mix(in srgb, var(--vscode-panel-border) 70%, transparent);
            border-radius: 4px;
            padding: 12px 14px 14px;
            background: color-mix(in srgb, var(--vscode-editor-foreground) 3%, transparent);
        }

        .stat-key {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 9.5px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--vscode-descriptionForeground);
            opacity: 0.8;
            margin-bottom: 7px;
        }

        .stat-value {
            font-family: 'EB Garamond', Georgia, serif;
            font-size: 28px;
            font-weight: 600;
            line-height: 1;
            color: var(--section-color, var(--vscode-editor-foreground));
        }

        /* -- Comparison table --------------------------------------------- */
        table {
            border-collapse: collapse;
            width: 100%;
            margin-bottom: 10px;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 12px;
        }

        th {
            text-align: left;
            padding: 6px 14px 6px 6px;
            border-bottom: 1px solid var(--vscode-panel-border);
            font-size: 9.5px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--vscode-descriptionForeground);
            font-weight: 500;
            opacity: 0.75;
            white-space: nowrap;
        }

        th.num, td.num { text-align: right; }

        td {
            padding: 5px 14px 5px 6px;
            border-bottom: 1px solid color-mix(in srgb, var(--vscode-panel-border) 35%, transparent);
            font-variant-numeric: tabular-nums;
        }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background: var(--vscode-list-hoverBackground); }

        /* Z-score coloring */
        .z-pos { color: #4ec9b0; }
        .z-neg { color: #ce9178; }
        .z-extreme { font-weight: 600; }

        .sub-section-label {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 10px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--vscode-descriptionForeground);
            opacity: 0.7;
            margin: 16px 0 8px;
        }

        .empty {
            color: var(--vscode-descriptionForeground);
            font-style: italic;
            font-family: 'EB Garamond', Georgia, serif;
            padding: 6px 0;
        }

        .db-info {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 10px;
            color: var(--vscode-descriptionForeground);
            opacity: 0.6;
            margin-bottom: 16px;
        }

        /* -- Database info card ------------------------------------------- */
        .db-info-name {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        /* -- Availability grid -------------------------------------------- */
        .db-grid {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            margin-bottom: 4px;
        }

        .db-grid th {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 9.5px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 6px 10px;
            text-align: center;
            color: var(--vscode-descriptionForeground);
            font-weight: 500;
            opacity: 0.75;
        }

        .grid-lang {
            font-family: 'EB Garamond', Georgia, serif;
            font-size: 14px;
            padding: 6px 12px;
            text-align: left;
        }

        .grid-cell {
            text-align: center;
            padding: 8px 10px;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 11px;
            border-radius: 3px;
            cursor: default;
            transition: background 0.15s;
        }

        .grid-available {
            cursor: pointer;
            color: #4ec9b0;
        }

        .grid-available:hover {
            background: var(--vscode-list-hoverBackground);
        }

        .grid-cell.grid-selected {
            background: color-mix(in srgb, var(--vscode-button-background) 20%, transparent);
            outline: 2px solid var(--vscode-button-background);
        }

        .grid-empty {
            color: var(--vscode-descriptionForeground);
            opacity: 0.4;
        }
    </style>
</head>
<body>
    <div class="cmd-eyebrow" id="cmd-eyebrow">CLAN Analysis</div>
    <h1 class="cmd-display" id="cmd-display"></h1>
    <p class="cmd-description" id="cmd-description"></p>
    <p class="file-name" id="file-name"></p>
    <hr class="header-rule">

<!--INJECT_CONFIG-->

    <div class="config-panel">
        <div class="config-title">File Characteristics</div>
        <div class="config-row">
            <div class="config-field">
                <label class="config-label" for="lang-select">Language</label>
                <select id="lang-select">
                    <option value="">Loading…</option>
                </select>
            </div>
            <div class="config-field">
                <label class="config-label" for="activity-select">Activity Type</label>
                <select id="activity-select">
                    <option value="">—</option>
                </select>
            </div>
            <div class="config-field">
                <label class="config-label" for="gender-select">Gender</label>
                <select id="gender-select">
                    <option value="">All</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>
        </div>
        <div class="config-row">
            <div class="config-field">
                <label class="config-label" for="age-from">Age from (months)</label>
                <input type="number" id="age-from" min="0" max="200" placeholder="—">
            </div>
            <div class="config-field">
                <label class="config-label" for="age-to">Age to (months)</label>
                <input type="number" id="age-to" min="0" max="200" placeholder="—">
            </div>
        </div>
    </div>

    <div class="config-panel" id="db-info-panel" style="display:none">
        <div class="config-title">Matching Database</div>
        <div id="db-info-name" class="db-info-name"></div>
        <div id="db-info-details" class="db-info"></div>
    </div>

    <div class="config-panel" id="db-grid-panel">
        <div class="config-title">Available Databases</div>
        <table id="db-grid" class="db-grid">
            <tr><td class="empty">Loading databases…</td></tr>
        </table>
    </div>

    <div class="btn-row" style="margin-bottom: 28px;">
        <button class="btn-run" id="btn-run" disabled>Compare with Database</button>
        <button class="btn-run-no-db" id="btn-run-no-db">Run without Database</button>
        <button class="btn-run" id="btn-export-csv" disabled>Export CSV</button>
    </div>

    <div id="status" class="status"></div>
    <div id="results"></div>

<!--INJECT_SCRIPT-->
</body>
</html>
