<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            background: var(--vscode-editor-background);
            color: var(--vscode-editor-foreground);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* -- Media element ------------------------------------------------- */
        #media {
            width: 100%;
            max-height: 40vh;
            background: #000;
            flex-shrink: 0;
        }
        audio#media {
            height: 40px;
            background: var(--vscode-editor-background);
        }

        /* -- Segment progress bar ------------------------------------------ */
        .seg-bar-track {
            height: 3px;
            background: color-mix(in srgb, var(--vscode-panel-border) 60%, transparent);
            flex-shrink: 0;
            position: relative;
            cursor: pointer;
        }
        .seg-bar-fill {
            height: 100%;
            width: 0%;
            background: var(--vscode-textLink-foreground, #4ec9b0);
            transition: width 80ms linear;
        }

        /* -- Controls ------------------------------------------------------ */
        .controls {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            border-bottom: 1px solid color-mix(in srgb, var(--vscode-panel-border) 50%, transparent);
            flex-shrink: 0;
        }

        .ctrl-btn {
            background: transparent;
            color: var(--vscode-editor-foreground);
            border: 1px solid color-mix(in srgb, var(--vscode-panel-border) 70%, transparent);
            width: 28px;
            height: 28px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 120ms;
        }
        .ctrl-btn:hover {
            background: var(--vscode-list-hoverBackground);
        }
        .ctrl-btn:active { opacity: 0.7; }
        .ctrl-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .ctrl-btn.active {
            color: var(--vscode-textLink-foreground, #4ec9b0);
            border-color: var(--vscode-textLink-foreground, #4ec9b0);
        }

        .time-group {
            display: flex;
            align-items: baseline;
            gap: 3px;
            font-size: 12px;
            font-variant-numeric: tabular-nums;
            margin-left: 4px;
            color: var(--vscode-editor-foreground);
        }
        .time-sep {
            color: var(--vscode-descriptionForeground);
            opacity: 0.5;
        }

        .speed-group {
            display: flex;
            align-items: center;
            gap: 3px;
            margin-left: 6px;
        }
        .speed-slider {
            width: 50px;
            accent-color: var(--vscode-textLink-foreground, #4ec9b0);
            cursor: pointer;
        }
        .speed-label {
            font-size: 10px;
            color: var(--vscode-descriptionForeground);
            min-width: 24px;
            font-variant-numeric: tabular-nums;
        }

        .seg-count {
            font-size: 10px;
            color: var(--vscode-descriptionForeground);
            opacity: 0.7;
            margin-left: auto;
            letter-spacing: 0.05em;
        }

        #status {
            font-size: 10px;
            color: var(--vscode-descriptionForeground);
            font-style: italic;
            opacity: 0.7;
        }

        /* -- Segment list -------------------------------------------------- */
        .seg-list-header {
            padding: 5px 12px 4px;
            font-size: 9px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--vscode-descriptionForeground);
            opacity: 0.6;
            border-bottom: 1px solid color-mix(in srgb, var(--vscode-panel-border) 35%, transparent);
            flex-shrink: 0;
        }

        .seg-list {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: thin;
        }

        .seg-row {
            display: flex;
            align-items: baseline;
            gap: 10px;
            padding: 5px 12px;
            cursor: pointer;
            border-bottom: 1px solid color-mix(in srgb, var(--vscode-panel-border) 20%, transparent);
            transition: background 80ms;
            font-size: 11px;
        }
        .seg-row:hover {
            background: var(--vscode-list-hoverBackground);
        }
        .seg-row.current {
            background: color-mix(in srgb, var(--vscode-textLink-foreground, #4ec9b0) 10%, transparent);
            border-left: 2px solid var(--vscode-textLink-foreground, #4ec9b0);
            padding-left: 10px;
        }

        .seg-row-indicator {
            width: 8px;
            flex-shrink: 0;
            color: var(--vscode-textLink-foreground, #4ec9b0);
            font-size: 10px;
        }

        .seg-row-range {
            font-variant-numeric: tabular-nums;
            color: var(--vscode-editor-foreground);
            flex: 1;
            white-space: nowrap;
        }

        .seg-row-line {
            font-size: 10px;
            color: var(--vscode-descriptionForeground);
            opacity: 0.6;
            white-space: nowrap;
        }

        .empty-notice {
            padding: 16px 12px;
            font-size: 12px;
            color: var(--vscode-descriptionForeground);
            font-style: italic;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <!--INJECT_MEDIA_TAG-->

    <div class="seg-bar-track" id="segBarTrack">
        <div class="seg-bar-fill" id="segBarFill"></div>
    </div>

    <div class="controls">
        <button class="ctrl-btn" id="prevBtn" title="Previous segment">&#9664;</button>
        <button class="ctrl-btn" id="stopBtn" title="Stop">&#9632;</button>
        <button class="ctrl-btn" id="nextBtn" title="Next segment">&#9654;</button>
        <button class="ctrl-btn" id="loopBtn" title="Toggle loop (F5)">&#8635;</button>
        <div class="time-group">
            <span id="timeCurrent">0:00.0</span>
            <span class="time-sep">/</span>
            <span id="timeEnd">0:00.0</span>
        </div>
        <span class="speed-group">
            <input type="range" class="speed-slider" id="speedSlider" min="25" max="200" value="100" step="25" title="Playback speed">
            <span class="speed-label" id="speedLabel">1x</span>
        </span>
        <span class="seg-count" id="segCount">&mdash;</span>
        <span id="status">Loading&#x2026;</span>
    </div>

    <div class="seg-list-header">utterances</div>
    <div class="seg-list" id="segList"></div>

<!--INJECT_DATA-->
<!--INJECT_SCRIPT-->
</body>
</html>
