<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waveform</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--vscode-editor-background);
            color: var(--vscode-editor-foreground);
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 12px;
            gap: 8px;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 13px;
        }

        #statusBar {
            color: var(--vscode-descriptionForeground);
            font-size: 12px;
            font-style: italic;
            min-height: 18px;
        }

        .toolbar {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
        }

        .tb-btn {
            background: transparent;
            color: var(--vscode-editor-foreground);
            border: 1px solid color-mix(in srgb, var(--vscode-panel-border) 60%, transparent);
            width: 26px;
            height: 26px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .tb-btn:hover { background: var(--vscode-list-hoverBackground); }
        .tb-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .tb-slider {
            width: 80px;
            accent-color: var(--vscode-textLink-foreground, #4ec9b0);
            cursor: pointer;
        }

        .tb-zoom-label {
            font-size: 10px;
            color: var(--vscode-descriptionForeground);
            min-width: 34px;
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        .tb-sep {
            width: 1px;
            height: 18px;
            background: color-mix(in srgb, var(--vscode-panel-border) 60%, transparent);
            margin: 0 4px;
        }

        #canvasContainer {
            flex: 1;
            position: relative;
            overflow-x: auto;
            overflow-y: hidden;
            background: var(--vscode-panel-background);
            border: 1px solid var(--vscode-panel-border);
            border-radius: 4px;
            cursor: crosshair;
        }

        canvas {
            display: block;
            height: 100%;
        }

        .legend {
            display: flex;
            gap: 16px;
            font-size: 11px;
            color: var(--vscode-descriptionForeground);
        }

        .legend-swatch {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 2px;
            vertical-align: middle;
            margin-right: 4px;
        }
    </style>
</head>
<body>
    <div id="statusBar">Loading audio&#x2026;</div>
    <div class="toolbar">
        <button class="tb-btn" id="zoomOutBtn" title="Zoom out">&minus;</button>
        <input type="range" class="tb-slider" id="zoomSlider" min="100" max="2000" value="100" title="Zoom">
        <button class="tb-btn" id="zoomInBtn" title="Zoom in">+</button>
        <span class="tb-zoom-label" id="zoomLevel">100%</span>
        <div class="tb-sep"></div>
        <button class="tb-btn" id="fitBtn" title="Fit to window">&#x26F6;</button>
    </div>
    <div id="canvasContainer">
        <canvas id="waveCanvas"></canvas>
    </div>
    <div class="legend">
        <span>
            <span class="legend-swatch" style="background:rgba(86,156,214,0.4)"></span>
            Utterance segments
        </span>
        <span>
            <span class="legend-swatch" style="background:#ffd700"></span>
            Current segment
        </span>
        <span>Click anywhere to seek</span>
    </div>

<!--INJECT_DATA-->
<!--INJECT_SCRIPT-->
</body>
</html>
